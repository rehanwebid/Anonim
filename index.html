<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anonymous Group</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Anti Ctrl+U -->
    <script>
        document.onkeydown = function(e) {
            if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'I') { e.preventDefault(); return false; }
            if (e.key === 'F12') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'J') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'C') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.key === 's') { e.preventDefault(); return false; }
        };
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</head>
<body>
    
    <!-- ============================================ -->
    <!-- POPUP LOGIN                                 -->
    <!-- ============================================ -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-container">
            
            <div class="login-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" width="48" height="48">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                <h2>Anonymous Group</h2>
            </div>
            
            <p class="form-desc">Login dengan Google untuk bergabung</p>
            
            <!-- Google Sign In Button -->
            <button class="google-btn" id="googleSignInBtn" onclick="signInWithGoogle()">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </button>
            
            <p class="privacy-text">
                Namamu tidak akan ditampilkan.<br>Kamu akan tampil sebagai Anonymous.
            </p>
            
            <!-- Loading -->
            <div class="login-loading" id="loginLoading" style="display: none;">
                <div class="spinner"></div>
                <p>Menghubungkan...</p>
            </div>
            
            <!-- Error -->
            <div class="login-error" id="loginError" style="display: none;"></div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- MAIN CHAT                                   -->
    <!-- ============================================ -->
    <div class="main-app" id="mainApp" style="display: none;">
        
        <!-- Header -->
        <div class="header">
            <img src="pp.webp" alt="Profile" class="profile-pic">
            <span class="group-name">Anonymous Group</span>
            <div class="spacer"></div>
            <div class="online-box">
                <svg class="group-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                <span class="online-text" id="onlineText">0 Online</span>
                <div class="online-dot" id="onlineDot"></div>
            </div>
            <button class="logout-btn" onclick="logout()" title="Keluar">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" width="18" height="18">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </button>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="empty-state">
                Belum ada pesan.<br>Jadilah yang pertama!
            </div>
        </div>

        <!-- Input -->
        <div class="input-container">
            <div class="hide-popup" id="hidePopup">
                <span class="detected-text" id="detectedText"></span>
                <button class="hide-btn" onclick="samarkan()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    Samarkan
                </button>
                <button class="close-btn" onclick="batalSamarkan()">✕</button>
            </div>

            <div class="input-wrapper">
                <input 
                    type="text" 
                    class="input-field" 
                    id="messageInput"
                    placeholder="Ketik pesan..."
                    onkeypress="handleKeyPress(event)"
                    oninput="deteksiSensitif()"
                >
                <button class="icon-btn send-btn" title="Kirim" onclick="kirimPesan()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getDatabase, ref, push, onChildAdded, set, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
        
        // Config
        const firebaseConfig = {
            apiKey: "AIzaSyAJvvJKNLJyFlAjAs_3-3puHW29T6wn4NI",
            authDomain: "anonymous-group-bbdd6.firebaseapp.com",
            databaseURL: "https://anonymous-group-bbdd6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "anonymous-group-bbdd6",
            storageBucket: "anonymous-group-bbdd6.firebasestorage.app",
            messagingSenderId: "149832195831",
            appId: "1:149832195831:web:8e4ac6584a252b941cfdf2"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        window.db = db;
        window.auth = auth;
        window.provider = provider;
        window.ref = ref;
        window.push = push;
        window.onChildAdded = onChildAdded;
        window.set = set;
        window.serverTimestamp = serverTimestamp;
        window.signInWithPopup = signInWithPopup;
        window.onAuthStateChanged = onAuthStateChanged;
        window.signOut = signOut;
    </script>

    <script src="script.js"></script>
</body>
</html>
