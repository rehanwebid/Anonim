<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anonymous Group</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Anti Ctrl+U -->
    <script>
        document.onkeydown = function(e) {
            if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'I') { e.preventDefault(); return false; }
            if (e.key === 'F12') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'J') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'C') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.key === 's') { e.preventDefault(); return false; }
        };
    </script>
</head>
<body>
    
    <!-- ============================================ -->
    <!-- POPUP LOGIN                                 -->
    <!-- ============================================ -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-container">
            
            <!-- Logo Group -->
            <div class="login-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" width="48" height="48">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                <h2>Anonymous Group</h2>
            </div>
            
            <!-- FORM SIGN IN -->
            <form class="login-form" id="signInForm">
                <h3>Sign In</h3>
                <p class="form-desc">Masuk dengan akun yang sudah terdaftar</p>
                
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" width="18" height="18">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    <input type="email" id="signInEmail" placeholder="Email" required>
                </div>
                
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" width="18" height="18">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" id="signInPassword" placeholder="Password" required>
                </div>
                
                <button type="submit" class="login-btn">Sign In</button>
                
                <p class="switch-form">
                    Belum punya akun? 
                    <a href="#" id="showSignUp">Sign Up</a>
                </p>
            </form>
            
            <!-- FORM SIGN UP -->
            <form class="login-form" id="signUpForm" style="display: none;">
                <h3>Sign Up</h3>
                <p class="form-desc">Daftar akun baru untuk bergabung</p>
                
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" width="18" height="18">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input type="text" id="signUpUsername" placeholder="Username" required>
                </div>
                
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" width="18" height="18">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    <input type="email" id="signUpEmail" placeholder="Email" required>
                </div>
                
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" width="18" height="18">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" id="signUpPassword" placeholder="Password" required>
                </div>
                
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" width="18" height="18">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        <path d="M12 15v3"/>
                    </svg>
                    <input type="password" id="signUpConfirm" placeholder="Konfirmasi Password" required>
                </div>
                
                <button type="submit" class="login-btn">Sign Up</button>
                
                <p class="switch-form">
                    Sudah punya akun? 
                    <a href="#" id="showSignIn">Sign In</a>
                </p>
            </form>
            
            <!-- Loading -->
            <div class="login-loading" id="loginLoading" style="display: none;">
                <div class="spinner"></div>
                <p>Memproses...</p>
            </div>
            
            <!-- Error Message -->
            <div class="login-error" id="loginError" style="display: none;"></div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- MAIN CHAT (HIDDEN SAAT LOGIN)              -->
    <!-- ============================================ -->
    <div class="main-app" id="mainApp" style="display: none;">
        
        <!-- Header -->
        <div class="header">
            <img src="pp.webp" alt="Profile" class="profile-pic">
            <span class="group-name">Anonymous Group</span>
            <div class="spacer"></div>
            <div class="online-box">
                <svg class="group-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                <span class="online-text" id="onlineText">0 Online</span>
                <div class="online-dot" id="onlineDot"></div>
            </div>
            <button class="logout-btn" onclick="logout()" title="Keluar">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" width="18" height="18">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </button>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="empty-state">
                Belum ada pesan.<br>Jadilah yang pertama!
            </div>
        </div>

        <!-- Input -->
        <div class="input-container" id="inputContainer">
            <div class="hide-popup" id="hidePopup">
                <span class="detected-text" id="detectedText"></span>
                <button class="hide-btn" onclick="samarkan()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    Samarkan
                </button>
                <button class="close-btn" onclick="batalSamarkan()">✕</button>
            </div>

            <div class="input-wrapper">
                <input 
                    type="text" 
                    class="input-field" 
                    id="messageInput"
                    placeholder="Ketik pesan..."
                    onkeypress="handleKeyPress(event)"
                    oninput="deteksiSensitif()"
                >
                <button class="icon-btn send-btn" title="Kirim" onclick="kirimPesan()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
