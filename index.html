<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anonymous Group</title>
    
    <!-- Font Orbitron -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- ============================================ -->
    <!-- 🛡️ ANTI CTRL+U / INSPECT / F12            -->
    <!-- ============================================ -->
    <script>
        document.onkeydown = function(e) {
            if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'I') { e.preventDefault(); return false; }
            if (e.key === 'F12') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'J') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'C') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.key === 's') { e.preventDefault(); return false; }
        };
    </script>
</head>
<body>
    
    <!-- ========== HEADER ========== -->
    <div class="header">
        <img src="https://via.placeholder.com/42" alt="Profile" class="profile-pic">
        <span class="group-name">Anonymous Group</span>
        <div class="spacer"></div>
        <div class="online-box">
            <svg class="group-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <span class="online-text" id="onlineText">0 Online</span>
            <div class="online-dot" id="onlineDot"></div>
        </div>
    </div>

    <!-- ========== AREA CHAT ========== -->
    <div class="chat-area" id="chatArea">
        <div class="empty-state">
            Belum ada pesan.<br>Jadilah yang pertama! 🚀
        </div>
    </div>

    <!-- ========== INPUT ========== -->
    <div class="input-container" id="inputContainer">
        <div class="hide-popup" id="hidePopup">
            <span class="detected-text" id="detectedText"></span>
            <button class="hide-btn" onclick="samarkan()">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                Samarkan
            </button>
            <button class="close-btn" onclick="batalSamarkan()">✕</button>
        </div>

        <div class="input-wrapper">
            <input 
                type="text" 
                class="input-field" 
                id="messageInput"
                placeholder="Ketik pesan..."
                onkeypress="handleKeyPress(event)"
                oninput="deteksiSensitif()"
            >

            <button class="icon-btn send-btn" title="Kirim" onclick="kirimPesan()">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Config -->
    <script src="config.js"></script>
    <!-- Script -->
    <script src="script.js"></script>
</body>
</html>
