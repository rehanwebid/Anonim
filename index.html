<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Group</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: black;
            width: 100vw;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ========== HEADER ========== */
        .header {
            background: #151515;
            width: 100%;
            height: 60px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 12px;
            flex-shrink: 0;
        }

        .profile-pic {
            width: 42px;
            height: 42px;
            border-radius: 0;
            object-fit: cover;
            flex-shrink: 0;
        }

        .group-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 500;
            color: white;
            letter-spacing: 1px;
        }

        .spacer {
            flex: 1;
        }

        .online-box {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #555;
            border-radius: 50%;
            transition: background 0.3s;
        }

        .online-dot.active {
            background: #00ff00;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .online-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.5px;
        }

        .group-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* ========== AREA CHAT ========== */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-area::-webkit-scrollbar {
            width: 4px;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        /* ========== PESAN ========== */
        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: fadeIn 0.3s ease;
        }

        .message-wrapper.me {
            align-items: flex-end;
            align-self: flex-end;
        }

        .message-wrapper.other {
            align-items: flex-start;
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .message-wrapper.me .bubble,
        .message-wrapper.other .bubble {
            background: #1a1a1a;
            color: rgba(255, 255, 255, 0.85);
        }

        .message-wrapper.me .bubble {
            border-bottom-right-radius: 2px;
        }

        .message-wrapper.other .bubble {
            border-bottom-left-radius: 2px;
        }

        .time {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 4px;
        }

        .message-wrapper.me .time {
            margin-right: 6px;
            text-align: right;
        }

        .message-wrapper.other .time {
            margin-left: 6px;
            text-align: left;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== HIDDEN TEXT ========== */
        .hidden-text {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.25);
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 2px;
            user-select: none;
            font-size: 11px;
            display: inline-block;
            text-decoration: line-through;
        }

        .hidden-text:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .hidden-text.revealed {
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 0;
            text-decoration: none;
            user-select: text;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.08);
        }

        /* ========== INPUT BAWAH ========== */
        .input-container {
            flex-shrink: 0;
            padding: 12px 16px;
            position: relative;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #151515;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 0 14px;
        }

        .left-icons {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            padding-right: 10px;
        }

        .right-icons {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            padding-left: 10px;
        }

        .icon-btn {
            width: 20px;
            height: 20px;
            cursor: pointer;
            opacity: 0.4;
            transition: opacity 0.2s;
            background: none;
            border: none;
            padding: 0;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            opacity: 0.8;
        }

        .icon-btn svg {
            width: 100%;
            height: 100%;
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 0;
            color: white;
            font-size: 14px;
            font-family: 'Segoe UI', Arial, sans-serif;
            outline: none;
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* ========== POP-UP SAMARKAN ========== */
        .hide-popup {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 8px 14px;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 100;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
        }

        .hide-popup.show {
            display: flex;
        }

        .hide-popup .detected-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hide-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .hide-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .hide-btn svg {
            width: 14px;
            height: 14px;
        }

        .close-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            line-height: 1;
        }

        .close-btn:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        /* ========== EMPTY STATE ========== */
        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.15);
            padding: 40px 20px;
            font-size: 13px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    
    <!-- ============================================ -->
    <!-- HEADER -->
    <!-- ============================================ -->
    <div class="header">
        <img src="https://via.placeholder.com/42" alt="Profile" class="profile-pic">
        <span class="group-name">Anonymous Group</span>
        <div class="spacer"></div>
        <div class="online-box">
            <svg class="group-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <span class="online-text" id="onlineText">0 Online</span>
            <div class="online-dot" id="onlineDot"></div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- AREA CHAT -->
    <!-- ============================================ -->
    <div class="chat-area" id="chatArea">
        <div class="empty-state">
            Belum ada pesan.<br>Jadilah yang pertama! 🚀
        </div>
    </div>

    <!-- ============================================ -->
    <!-- INPUT -->
    <!-- ============================================ -->
    <div class="input-container" id="inputContainer">
        
        <!-- Pop-up Samarkan -->
        <div class="hide-popup" id="hidePopup">
            <span class="detected-text" id="detectedText"></span>
            <button class="hide-btn" onclick="samarkan()">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                Samarkan
            </button>
            <button class="close-btn" onclick="batalSamarkan()">✕</button>
        </div>

        <div class="input-wrapper">
            
            <div class="left-icons">
                <button class="icon-btn" title="Foto" onclick="alert('📷 Fitur upload foto')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                </button>
                <button class="icon-btn" title="Video" onclick="alert('🎬 Fitur upload video')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <polygon points="23 7 16 12 23 17 23 7"/>
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                    </svg>
                </button>
                <button class="icon-btn" title="File" onclick="alert('📄 Fitur upload file')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                </button>
            </div>

            <input 
                type="text" 
                class="input-field" 
                id="messageInput"
                placeholder="Ketik pesan..."
                onkeypress="handleKeyPress(event)"
                oninput="deteksiSensitif()"
            >

            <div class="right-icons">
                <button class="icon-btn" title="Kirim" onclick="kirimPesan()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // ⚙️ KONFIGURASI - GANTI URL INI
        // ============================================
        const API_URL = 'https://script.google.com/macros/s/AKfycbxETY9QM9jemUH92wDQ7ovaxaER_DrR2cuQYuRFCnNEmF9KBMvaRL-iF96FQ5A2P0nJ/exec';
        
        // Username random (simpan di localStorage biar tetap)
        let username = localStorage.getItem('anonUsername');
        if (!username) {
            username = 'Anonymous' + Math.floor(Math.random() * 9999);
            localStorage.setItem('anonUsername', username);
        }
        
        const colorPalette = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', 
            '#FFEAA7', '#DDA0DD', '#98D8C8', '#F7DC6F',
            '#BB8FCE', '#85C1E9', '#F8C471', '#82E0AA'
        ];
        let userColor = localStorage.getItem('anonColor');
        if (!userColor) {
            userColor = colorPalette[Math.floor(Math.random() * colorPalette.length)];
            localStorage.setItem('anonColor', userColor);
        }
        
        let lastMessageId = 0;
        let renderedMessageIds = new Set();
        let isFirstLoad = true;
        
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const onlineText = document.getElementById('onlineText');
        const onlineDot = document.getElementById('onlineDot');
        const hidePopup = document.getElementById('hidePopup');
        const detectedText = document.getElementById('detectedText');
        
        let currentSensitiveText = '';
        let sensitiveRange = null;

        // ============================================
        // 🔄 POLLING SETIAP 1 DETIK
        // ============================================
        setInterval(loadMessages, 1000);
        loadMessages();

        async function loadMessages() {
            try {
                const response = await fetch(`${API_URL}?action=getMessages&lastId=${lastMessageId}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    if (isFirstLoad) {
                        chatArea.innerHTML = '';
                        renderedMessageIds.clear();
                        isFirstLoad = false;
                    }
                    
                    updateOnlineIndicator(data.onlineCount || 0);
                    
                    if (data.messages && data.messages.length > 0) {
                        let hasNewMessage = false;
                        
                        data.messages.forEach(msg => {
                            if (msg.id > lastMessageId && !renderedMessageIds.has(msg.id)) {
                                const isMe = (msg.sender === username);
                                addMessageToUI(msg.message, msg.timestamp, isMe);
                                renderedMessageIds.add(msg.id);
                                lastMessageId = msg.id;
                                hasNewMessage = true;
                            }
                        });
                        
                        if (hasNewMessage) {
                            chatArea.scrollTop = chatArea.scrollHeight;
                        }
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                if (isFirstLoad) {
                    chatArea.innerHTML = '<div class="empty-state" style="color: #ff4444;">⚠️ Gagal terhubung ke server</div>';
                }
            }
        }

        function updateOnlineIndicator(count) {
            onlineText.textContent = count + ' Online';
            if (count > 0) {
                onlineDot.classList.add('active');
            } else {
                onlineDot.classList.remove('active');
            }
        }

        // ============================================
        // 🔍 DETEKSI NOMOR & LINK
        // ============================================
        function deteksiSensitif() {
            const text = messageInput.value;
            const cursorPos = messageInput.selectionStart;
            
            const phoneRegex = /(\+?62|0)8[1-9][0-9]{6,11}/g;
            const linkRegex = /https?:\/\/[^\s]+/g;
            
            let match;
            let found = false;
            
            while ((match = phoneRegex.exec(text)) !== null) {
                if (cursorPos >= match.index && cursorPos <= match.index + match[0].length) {
                    currentSensitiveText = match[0];
                    sensitiveRange = { start: match.index, end: match.index + match[0].length };
                    showPopup(match[0]);
                    found = true;
                    break;
                }
            }
            
            if (!found) {
                linkRegex.lastIndex = 0;
                while ((match = linkRegex.exec(text)) !== null) {
                    if (cursorPos >= match.index && cursorPos <= match.index + match[0].length) {
                        currentSensitiveText = match[0];
                        sensitiveRange = { start: match.index, end: match.index + match[0].length };
                        showPopup(match[0]);
                        found = true;
                        break;
                    }
                }
            }
            
            if (!found) {
                hidePopupFn();
            }
        }

        function showPopup(text) {
            detectedText.textContent = text.length > 20 ? text.substring(0, 20) + '...' : text;
            hidePopup.classList.add('show');
        }

        function hidePopupFn() {
            hidePopup.classList.remove('show');
            currentSensitiveText = '';
            sensitiveRange = null;
        }

        function batalSamarkan() {
            hidePopupFn();
            messageInput.focus();
        }

        // ============================================
        // 🔒 SAMARKAN NOMOR/LINK
        // ============================================
        function samarkan() {
            if (!currentSensitiveText || !sensitiveRange) return;
            
            const text = messageInput.value;
            const before = text.substring(0, sensitiveRange.start);
            const after = text.substring(sensitiveRange.end);
            
            const encrypted = '[[HIDDEN:' + btoa(currentSensitiveText) + ']]';
            messageInput.value = before + encrypted + after;
            
            hidePopupFn();
            messageInput.focus();
        }

        // ============================================
        // 📤 KIRIM PESAN
        // ============================================
        function kirimPesan() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            messageInput.value = '';
            
            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'sendMessage',
                    sender: username,
                    message: message,
                    color: userColor
                })
            }).catch(error => console.error('Error:', error));
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                kirimPesan();
            }
        }

        // ============================================
        // 🎨 RENDER PESAN (HANYA PESAN + WAKTU)
        // ============================================
        function addMessageToUI(message, timestamp, isMe) {
            const placeholder = chatArea.querySelector('.empty-state');
            if (placeholder) placeholder.remove();
            
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper ' + (isMe ? 'me' : 'other');
            
            const parsedMessage = parseHiddenText(message);
            
            wrapper.innerHTML = `
                <div class="bubble">${parsedMessage}</div>
                <div class="time">${formatTime(timestamp)}</div>
            `;
            
            wrapper.querySelectorAll('.hidden-text').forEach(el => {
                el.addEventListener('click', function() {
                    this.classList.toggle('revealed');
                    if (this.classList.contains('revealed')) {
                        this.textContent = this.dataset.original;
                    } else {
                        this.textContent = '••••••••';
                    }
                });
            });
            
            chatArea.appendChild(wrapper);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function parseHiddenText(text) {
            const regex = /\[\[HIDDEN:(.*?)\]\]/g;
            return text.replace(regex, (match, encoded) => {
                try {
                    const original = atob(encoded);
                    return `<span class="hidden-text" data-original="${escapeHtml(original)}">••••••••</span>`;
                } catch(e) {
                    return match;
                }
            });
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            try {
                const parts = timestamp.split(' ');
                if (parts.length >= 2) return parts[1].substring(0, 5);
            } catch(e) {}
            return '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
    
</body>
</html>
